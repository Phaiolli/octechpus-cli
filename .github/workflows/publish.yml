name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm test

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishing (OIDC, tokenless)

    steps:
      - uses: actions/checkout@v4

      # No registry-url here: it injects a NODE_AUTH_TOKEN .npmrc that breaks
      # OIDC. Trusted Publishing authorizes via the id-token alone.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Trusted Publishing (OIDC + provenance) requires npm >= 11.5.1
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Check if version changed
        id: version_check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view octechpus version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (version already published)
        if: steps.version_check.outputs.changed == 'false'
        run: echo "octechpus@${{ steps.version_check.outputs.current }} já está no npm. Pulando."

      - name: Publish (OIDC / Trusted Publisher)
        if: steps.version_check.outputs.changed == 'true'
        run: npm publish --provenance --access public

      - name: Summary
        if: steps.version_check.outputs.changed == 'true'
        run: echo "Publicado octechpus@${{ steps.version_check.outputs.current }} no npm"
