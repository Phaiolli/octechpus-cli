name: _base
description: >
  Base profile inherited by all stacks. Contains universal rules, agent definitions,
  and the list of required placeholders that concrete profiles must fill.

# ── Agents ──────────────────────────────────────────────────────────────────
agents:
  maestro: true
  github: true
  architect: true
  coder: true
  reviewer: true
  qa: true
  security: true
  privacy: true        # always-on — data protection / LGPD-GDPR
  docs: true
  reporter: true
  profiler: true
  designer: true       # always-on — stack-agnostic UX/UI guardian (no prebuilt design system)
  cost_engineer: false

# ── Pipeline ─────────────────────────────────────────────────────────────────
pipeline_rules:
  - No agent may be skipped without explicit justification from Maestro
  - A rejection from any agent sends the work back to the responsible agent
  - Reporter produces a final consolidated report after every pipeline run
  - Agents communicate only through structured handoffs, not free-form chat

# ── Conventions ──────────────────────────────────────────────────────────────
commit_convention: conventional_commits

branch_naming: "[type]/[issue-number]-[description]"

# ── Documentation ─────────────────────────────────────────────────────────────
documentation:
  adr_required_for: ["medium", "high"]
  changelog_format: keep_a_changelog
  readme_required: true

# ── Code patterns ─────────────────────────────────────────────────────────────
# Two severity tiers checked by the Reviewer:
#   forbidden_patterns → 🔴 BLOCKER (auto-reject)   — defined per concrete profile
#   warn_patterns      → 🟡 WARNING (flag, não bloqueia)
# Arrays are replaced (not merged) on inheritance, so a profile can drop/retune them.
warn_patterns: []

# ── Design System ─────────────────────────────────────────────────────────────
design_system:
  tokens: none   # none | css-only | tailwind

# ── Security ──────────────────────────────────────────────────────────────────
security:
  owasp_top_10: true       # OWASP Top 10 (2021) + API Security Top 10
  secret_scanning: true
  supply_chain: true       # dependency audit / SBOM / pinned versions

# ── Permissions (gera .claude/settings.json) ──────────────────────────────────
# Modelo de menor privilégio para o Claude Code: pré-aprova o trabalho seguro
# (allow), pede confirmação na zona cinzenta (ask) e bloqueia o destrutivo (deny).
# Arrays concatenam na herança — um profile pode ADICIONAR comandos da sua stack.
# Regras extras de deny para pastas read-only são derivadas de guardrails.read_only_paths.
permissions:
  allow:
    # leitura / navegação
    - "Bash(ls:*)"
    - "Bash(cat:*)"
    - "Bash(grep:*)"
    - "Bash(rg:*)"
    - "Bash(find:*)"
    - "Bash(echo:*)"
    - "Bash(pwd)"
    # git (leitura + fluxo local)
    - "Bash(git status:*)"
    - "Bash(git diff:*)"
    - "Bash(git log:*)"
    - "Bash(git branch:*)"
    - "Bash(git add:*)"
    - "Bash(git commit:*)"
    - "Bash(git checkout:*)"
    - "Bash(git stash:*)"
    # toolchains comuns (cobre as stacks suportadas out-of-the-box)
    - "Bash(npm test:*)"
    - "Bash(npm run:*)"
    - "Bash(npm ci:*)"
    - "Bash(npm install:*)"
    - "Bash(npx:*)"
    - "Bash(pnpm:*)"
    - "Bash(yarn:*)"
    - "Bash(node:*)"
    - "Bash(pytest:*)"
    - "Bash(python:*)"
    - "Bash(python3:*)"
    - "Bash(pip:*)"
    - "Bash(uv:*)"
    - "Bash(ruff:*)"
    - "Bash(go test:*)"
    - "Bash(go build:*)"
    - "Bash(go vet:*)"
    - "Bash(cargo test:*)"
    - "Bash(cargo build:*)"
    - "Bash(cargo clippy:*)"
    - "Bash(mvn:*)"
    - "Bash(gradle:*)"
    - "Bash(dotnet:*)"
    - "Bash(bundle:*)"
    - "Bash(rspec:*)"
    - "Bash(composer:*)"
    - "Bash(php:*)"
    - "Bash(gh:*)"
  ask:
    # ações com efeito externo — pausa e pede aprovação humana
    - "Bash(git push:*)"
    - "Bash(npm publish:*)"
  deny:
    # destrutivo / irreversível
    - "Bash(rm -rf:*)"
    - "Bash(git push --force:*)"
    - "Bash(git push -f:*)"
    - "Bash(git reset --hard:*)"
    - "Bash(sudo:*)"
    - "Bash(chmod 777:*)"
    # exfiltração de rede
    - "Bash(curl:*)"
    - "Bash(wget:*)"
    # leitura de segredos — agentes nunca devem ler .env / chaves privadas
    - "Read(./.env)"
    - "Read(./.env.*)"
    - "Read(./**/.env)"
    - "Read(./**/*.pem)"
    - "Read(./**/id_rsa)"
    - "Read(./secrets/**)"

# ── Runtime dos agentes (gera .claude/agents/*.md) ────────────────────────────
# Cada agente vira um subagent do Claude Code com ferramentas escopadas e modelo
# próprio. Princípio do menor privilégio: agentes de ANÁLISE são read-only (não
# têm Write/Edit/Bash), agentes de AÇÃO têm escrita. Model tiering controla custo.
#   tools: read_only  → Read, Grep, Glob
#   tools: read_write → Read, Write, Edit, Bash, Grep, Glob
#   model: inherit | haiku | sonnet | opus
agents_runtime:
  maestro:       { tools: read_write, model: inherit }
  github:        { tools: read_write, model: inherit }
  architect:     { tools: read_only,  model: opus }
  designer:      { tools: read_only,  model: inherit }
  coder:         { tools: read_write, model: inherit }
  reviewer:      { tools: read_only,  model: inherit }
  qa:            { tools: read_write, model: inherit }
  security:      { tools: read_only,  model: opus }
  privacy:       { tools: read_only,  model: inherit }
  docs:          { tools: read_write, model: haiku }
  reporter:      { tools: read_only,  model: haiku }
  profiler:      { tools: read_only,  model: haiku }
  cost_engineer: { tools: read_only,  model: inherit }

# ── Privacy / Compliance ──────────────────────────────────────────────────────
compliance:
  framework: lgpd          # lgpd | gdpr | lgpd_gdpr | none
  privacy_review_required: true
  pii_in_logs: forbidden   # PII must never reach logs/telemetry/fixtures

# ── Required placeholders ─────────────────────────────────────────────────────
# Concrete profiles MUST fill all of these. init fails if any is missing.
required_placeholders:
  - language
  - runtime
  - package_manager
  - testing.framework
  - testing.coverage_target
  - validation.library
  - docs.format
  - linting.formatter
  - linting.type_checker
  - conventions.imports
  - conventions.naming
  - forbidden_patterns
  - guardrails.read_only_paths
  - review_checklist
  - qa_strategy
