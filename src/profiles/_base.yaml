name: _base
description: >
  Base profile inherited by all stacks. Contains universal rules, agent definitions,
  and the list of required placeholders that concrete profiles must fill.

# ── Agents ──────────────────────────────────────────────────────────────────
agents:
  maestro: true
  github: true
  architect: true
  coder: true
  reviewer: true
  qa: true
  security: true
  privacy: true        # always-on — data protection / LGPD-GDPR
  docs: true
  reporter: true
  profiler: true
  designer: true       # always-on — stack-agnostic UX/UI guardian (no prebuilt design system)
  cost_engineer: false

# ── Pipeline ─────────────────────────────────────────────────────────────────
pipeline_rules:
  - No agent may be skipped without explicit justification from Maestro
  - A rejection from any agent sends the work back to the responsible agent
  - Reporter produces a final consolidated report after every pipeline run
  - Agents communicate only through structured handoffs, not free-form chat

# ── Conventions ──────────────────────────────────────────────────────────────
commit_convention: conventional_commits

branch_naming: "[type]/[issue-number]-[description]"

# ── Documentation ─────────────────────────────────────────────────────────────
documentation:
  adr_required_for: ["medium", "high"]
  changelog_format: keep_a_changelog
  readme_required: true

# ── Code patterns ─────────────────────────────────────────────────────────────
# Two severity tiers checked by the Reviewer:
#   forbidden_patterns → 🔴 BLOCKER (auto-reject)   — defined per concrete profile
#   warn_patterns      → 🟡 WARNING (flag, não bloqueia)
# Arrays are replaced (not merged) on inheritance, so a profile can drop/retune them.
warn_patterns: []

# ── Design System ─────────────────────────────────────────────────────────────
design_system:
  tokens: none   # none | css-only | tailwind

# ── Security ──────────────────────────────────────────────────────────────────
security:
  owasp_top_10: true       # OWASP Top 10 (2021) + API Security Top 10
  secret_scanning: true
  supply_chain: true       # dependency audit / SBOM / pinned versions

# ── Privacy / Compliance ──────────────────────────────────────────────────────
compliance:
  framework: lgpd          # lgpd | gdpr | lgpd_gdpr | none
  privacy_review_required: true
  pii_in_logs: forbidden   # PII must never reach logs/telemetry/fixtures

# ── Required placeholders ─────────────────────────────────────────────────────
# Concrete profiles MUST fill all of these. init fails if any is missing.
required_placeholders:
  - language
  - runtime
  - package_manager
  - testing.framework
  - testing.coverage_target
  - validation.library
  - docs.format
  - linting.formatter
  - linting.type_checker
  - conventions.imports
  - conventions.naming
  - forbidden_patterns
  - guardrails.read_only_paths
  - review_checklist
  - qa_strategy
