extends: node-typescript
name: nextjs-react
description: "Next.js + React + Tailwind + shadcn/ui"
tags: [frontend, web, react, nextjs, typescript]
when_to_use: "apps Next.js / React (dep next ou next.config.*)"
example_project: "O site/loja de uma empresa, um blog ou um painel administrativo na web"

agents:
  designer: true
  cost_engineer: false

design_system:
  tokens: tailwind

frontend:
  framework: nextjs_app_router
  styling: tailwind_shadcn
  icons: lucide

forbidden_patterns:
  - "bg-\\[#"
  - "text-\\[#"
  - "p-\\["
  - "m-\\["
  - "transition-all"

warn_patterns:
  - "<img "            # prefira next/image
  - "dangerouslySetInnerHTML"
