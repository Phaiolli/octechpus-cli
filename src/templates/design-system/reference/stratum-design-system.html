            'e.preventDefault();' +

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).

    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

      try { return decodeURIComponent(s); } catch (e) { return s; }
    }

      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };

      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });

      var gen = ++navGen;
      frame.onload = function() {

        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.

        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}

        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);

        else cw.scrollTo(0, 0);

-label=\"Emerald accent\" style=\"width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid {{ accentBorderEmerald }}; background: oklch(0.70 0.15 160); cursor: pointer; padding: 0;\"><\u002Fbutton>\n      <button onclick=\"{{ setAccentAmber }}\" aria-label=\"Amber accent\" style=\"width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid {{ accentBorderAmber }}; background: oklch(0.80 0.14 80); cursor: pointer; padding: 0;\"><\u002Fbutton>\n      <button onclick=\"{{ setAccentRose }}\" aria-label=\"Rose accent\" style=\"width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid {{ accentBorderRose }}; background: oklch(0.68 0.18 15); cursor: pointer; padding: 0;\"><\u002Fbutton>\n    <\u002Fdiv>\n\n    <button onclick=\"{{ toggleTheme }}\" aria-label=\"Toggle theme\" style=\"display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-secondary); cursor: pointer; font-family: inherit; font-size: 13px;\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">{{ themeIconPath }}<\u002Fsvg>\n      <span style=\"font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px;\">{{ themeLabel }}<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fheader>\n\n  <div style=\"display: grid; grid-template-columns: 240px 1fr; max-width: 1600px; margin: 0 auto;\">\n\n    {{!-- ============ SIDE NAV ============ --}}\n    <aside style=\"position: sticky; top: 60px; align-self: start; height: calc(100vh - 60px); overflow-y: auto; padding: 24px 12px 48px 24px; border-right: 1px solid var(--border-subtle);\">\n      <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n        <div style=\"font-size: 10px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 8px 10px;\">Foundations<\u002Fdiv>\n        <a href=\"#overview\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Overview &amp; princípios<\u002Fa>\n        <a href=\"#brand\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Brand &amp; logo<\u002Fa>\n        <a href=\"#color\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Color<\u002Fa>\n        <a href=\"#typography\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Typography<\u002Fa>\n        <a href=\"#spacing\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Spacing &amp; grid<\u002Fa>\n        <a href=\"#radius\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Radius &amp; shadow<\u002Fa>\n        <a href=\"#motion\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Motion<\u002Fa>\n        <a href=\"#icons\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Iconography<\u002Fa>\n        <a href=\"#tokens\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Token export<\u002Fa>\n\n        <div style=\"font-size: 10px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 16px 10px 8px;\">Components<\u002Fdiv>\n        <a href=\"#buttons\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Buttons<\u002Fa>\n        <a href=\"#forms\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Form controls<\u002Fa>\n        <a href=\"#data-display\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Data display<\u002Fa>\n        <a href=\"#feedback\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Feedback<\u002Fa>\n        <a href=\"#overlays\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Overlays<\u002Fa>\n        <a href=\"#navigation\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Navigation<\u002Fa>\n        <a href=\"#charts\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Data viz<\u002Fa>\n        <a href=\"#extra-components\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Kanban, chat, audit<\u002Fa>\n\n        <div style=\"font-size: 10px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 16px 10px 8px;\">Patterns &amp; pages<\u002Fdiv>\n        <a href=\"#patterns\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">App shells<\u002Fa>\n        <a href=\"#tpl-home\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Home institucional<\u002Fa>\n        <a href=\"#tpl-dashboard\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Dashboard SaaS<\u002Fa>\n        <a href=\"#tpl-login\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Login<\u002Fa>\n        <a href=\"#tpl-list\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Listagem + filtros<\u002Fa>\n        <a href=\"#tpl-settings\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Configurações<\u002Fa>\n        <a href=\"#tpl-mobile\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Mobile<\u002Fa>\n        <a href=\"#tpl-utility\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">404, manutenção, sucesso<\u002Fa>\n\n        <div style=\"font-size: 10px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 16px 10px 8px;\">Guidelines<\u002Fdiv>\n        <a href=\"#lgpd\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">LGPD &amp; privacidade<\u002Fa>\n        <a href=\"#a11y\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Acessibilidade<\u002Fa>\n        <a href=\"#voice\" style=\"display: block; font-size: 13px; padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); text-decoration: none;\">Voz &amp; microcopy<\u002Fa>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    {{!-- ============ MAIN ============ --}}\n    <main style=\"padding: 48px 56px 120px; min-width: 0;\">\n\n      {{!-- ========== OVERVIEW ========== --}}\n      <section id=\"overview\" style=\"margin-bottom: 96px;\">\n        <div style=\"display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px; background: var(--primary-soft); color: var(--primary); border-radius: 999px; font-size: 11px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 24px;\">\n          <span style=\"width: 6px; height: 6px; border-radius: 999px; background: currentColor;\"><\u002Fspan>\n          Stratum DS · documento vivo\n        <\u002Fdiv>\n        <h1 style=\"font-size: 64px; line-height: 1.02; letter-spacing: -0.035em; font-weight: 600; margin: 0 0 24px; max-width: 16ch;\">\n          Um design system híbrido para construir produtos sérios.\n        <\u002Fh1>\n        <p style=\"font-size: 19px; line-height: 1.55; color: var(--text-secondary); max-width: 62ch; margin: 0 0 40px; font-weight: 300;\">\n          Stratum é uma base visual e funcional unificada para sistemas, sites, dashboards, portais e apps. Dark mode como padrão, light mode opcional, identidade adaptável por marca, tokens prontos para React/Next, Tailwind e qualquer pipeline moderno.\n        <\u002Fp>\n\n        <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 48px;\">\n          <div style=\"padding: 20px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 28px; font-weight: 600; letter-spacing: -0.02em;\">240+<\u002Fdiv>\n            <div style=\"font-size: 12px; color: var(--text-muted); margin-top: 4px;\">design tokens<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 20px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 28px; font-weight: 600; letter-spacing: -0.02em;\">68<\u002Fdiv>\n            <div style=\"font-size: 12px; color: var(--text-muted); margin-top: 4px;\">componentes<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 20px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 28px; font-weight: 600; letter-spacing: -0.02em;\">22<\u002Fdiv>\n            <div style=\"font-size: 12px; color: var(--text-muted); margin-top: 4px;\">templates de página<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 20px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 28px; font-weight: 600; letter-spacing: -0.02em;\">AA+<\u002Fdiv>\n            <div style=\"font-size: 12px; color: var(--text-muted); margin-top: 4px;\">contraste WCAG<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2 style=\"font-size: 14px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 0 0 20px; font-weight: 500;\">Princípios de design<\u002Fh2>\n        <div style=\"display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border-subtle); border: 1px solid var(--border-subtle); border-radius: 16px; overflow: hidden;\">\n          <div style=\"padding: 28px; background: var(--surface);\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 8px;\">01 · Clareza antes de estilo<\u002Fdiv>\n            <h3 style=\"font-size: 18px; margin: 0 0 8px; font-weight: 500; letter-spacing: -0.01em;\">Hierarquia visual silenciosa<\u002Fh3>\n            <p style=\"font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin: 0;\">A tela inteira não pode gritar. Tons neutros sustentam; cor é gasta apenas onde existe ação ou risco real.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding: 28px; background: var(--surface);\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 8px;\">02 · Densidade informada<\u002Fdiv>\n            <h3 style=\"font-size: 18px; margin: 0 0 8px; font-weight: 500; letter-spacing: -0.01em;\">Mais sinal, menos chrome<\u002Fh3>\n            <p style=\"font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin: 0;\">Operadores precisam de densidade; institucionais precisam de respiro. Densidade é um token, não uma improvisação.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding: 28px; background: var(--surface);\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 8px;\">03 · Consistência sobre criatividade<\u002Fdiv>\n            <h3 style=\"font-size: 18px; margin: 0 0 8px; font-weight: 500; letter-spacing: -0.01em;\">Um padrão, repetido<\u002Fh3>\n            <p style=\"font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin: 0;\">Quem usa o produto não deveria precisar reaprender padrões de tela em tela. Variação é deliberada, nunca acidental.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding: 28px; background: var(--surface);\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 8px;\">04 · Acessível por padrão<\u002Fdiv>\n            <h3 style=\"font-size: 18px; margin: 0 0 8px; font-weight: 500; letter-spacing: -0.01em;\">A11y é estado base<\u002Fh3>\n            <p style=\"font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin: 0;\">Foco visível, contraste AA, navegação por teclado, redução de movimento — não são opcionais, são pré-requisitos.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding: 28px; background: var(--surface);\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 8px;\">05 · Marca como camada<\u002Fdiv>\n            <h3 style=\"font-size: 18px; margin: 0 0 8px; font-weight: 500; letter-spacing: -0.01em;\">Branding é troca de tokens<\u002Fh3>\n            <p style=\"font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin: 0;\">Logo, cor primária e tom de voz mudam por projeto. Estrutura, espaçamento e comportamento, não.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding: 28px; background: var(--surface);\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 8px;\">06 · Confiança é construída<\u002Fdiv>\n            <h3 style=\"font-size: 18px; margin: 0 0 8px; font-weight: 500; letter-spacing: -0.01em;\">Microcopy honesta<\u002Fh3>\n            <p style=\"font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin: 0;\">Erros explicam o que aconteceu e o que fazer. Confirmações destrutivas pedem ação consciente, nunca clique impulsivo.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      {{!-- ========== BRAND &amp; LOGO ========== --}}\n      <section id=\"brand\" style=\"margin-bottom: 96px;\">\n        <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px;\">\n          <h2 style=\"font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin: 0;\">Brand &amp; logo<\u002Fh2>\n          <span style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;\">§02 / Foundations<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size: 15px; color: var(--text-secondary); margin: 0 0 32px; max-width: 70ch;\">Stratum não impõe identidade. Cada projeto recebe um slot de logo, uma cor primária e, opcionalmente, um par tipográfico. O restante do sistema permanece estável.<\u002Fp>\n\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px;\">\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 32px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.06em;\">Logo horizontal<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 14px; padding: 28px 0;\">\n              <div style=\"width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: grid; place-items: center; box-shadow: var(--shadow-md);\">\n                <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary-fg)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7l9-4 9 4-9 4-9-4z\"><\u002Fpath><path d=\"M3 12l9 4 9-4\"><\u002Fpath><path d=\"M3 17l9 4 9-4\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"font-size: 24px; font-weight: 600; letter-spacing: -0.02em;\">Acme<span style=\"color: var(--primary);\">.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size: 12px; color: var(--text-muted);\">Para headers, navbars institucionais e assinaturas largas.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 32px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.06em;\">Logo vertical<\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px 0;\">\n              <div style=\"width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: grid; place-items: center; box-shadow: var(--shadow-md);\">\n                <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary-fg)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7l9-4 9 4-9 4-9-4z\"><\u002Fpath><path d=\"M3 12l9 4 9-4\"><\u002Fpath><path d=\"M3 17l9 4 9-4\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"font-size: 18px; font-weight: 600; letter-spacing: -0.01em;\">Acme<span style=\"color: var(--primary);\">.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size: 12px; color: var(--text-muted);\">Para splash, login, e-mails transacionais e apps mobile.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 32px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.06em;\">Símbolo / app icon<\u002Fdiv>\n            <div style=\"display: flex; gap: 16px; align-items: center; padding: 16px 0;\">\n              <div style=\"width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: grid; place-items: center; box-shadow: var(--shadow-lg);\">\n                <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary-fg)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7l9-4 9 4-9 4-9-4z\"><\u002Fpath><path d=\"M3 12l9 4 9-4\"><\u002Fpath><path d=\"M3 17l9 4 9-4\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: grid; place-items: center;\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary-fg)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7l9-4 9 4-9 4-9-4z\"><\u002Fpath><path d=\"M3 12l9 4 9-4\"><\u002Fpath><path d=\"M3 17l9 4 9-4\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: grid; place-items: center;\">\n                <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary-fg)\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7l9-4 9 4-9 4-9-4z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size: 12px; color: var(--text-muted);\">Avatares, espaços apertados, ícones de PWA.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 32px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.06em;\">Favicon · 16/32px<\u002Fdiv>\n            <div style=\"display: flex; gap: 16px; align-items: center; padding: 16px 0;\">\n              <div style=\"width: 32px; height: 32px; border-radius: 6px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: grid; place-items: center;\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary-fg)\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7l9-4 9 4-9 4-9-4z\"><\u002Fpath><\u002Fsvg>\n  letter-spacing: 0.06em;\">§07 / Foundations<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size: 15px; color: var(--text-secondary); margin: 0 0 32px; max-width: 70ch;\">Animações servem a percepção, não ao espetáculo. Curvas suaves, durações curtas, sempre respeitando <code style=\"font-family:'Geist Mono',monospace; color: var(--text-primary);\">prefers-reduced-motion<\u002Fcode>.<\u002Fp>\n\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;\">\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; overflow: hidden;\">\n            <div style=\"padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;\">Durações<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding: 8px 20px;\">\n              <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 0; border-bottom: 1px solid var(--border-subtle); align-items: center;\"><code style=\"font-family:'Geist Mono',monospace; font-size: 12px;\">instant<\u002Fcode><span style=\"font-family:'Geist Mono',monospace; font-size: 12px; color: var(--text-muted);\">100ms<\u002Fspan><span style=\"font-size: 12px; color: var(--text-secondary);\">hover, focus<\u002Fspan><\u002Fdiv>\n              <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 0; border-bottom: 1px solid var(--border-subtle); align-items: center;\"><code style=\"font-family:'Geist Mono',monospace; font-size: 12px;\">fast<\u002Fcode><span style=\"font-family:'Geist Mono',monospace; font-size: 12px; color: var(--text-muted);\">160ms<\u002Fspan><span style=\"font-size: 12px; color: var(--text-secondary);\">tooltips, switches<\u002Fspan><\u002Fdiv>\n              <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 0; border-bottom: 1px solid var(--border-subtle); align-items: center;\"><code style=\"font-family:'Geist Mono',monospace; font-size: 12px;\">base<\u002Fcode><span style=\"font-family:'Geist Mono',monospace; font-size: 12px; color: var(--text-muted);\">220ms<\u002Fspan><span style=\"font-size: 12px; color: var(--text-secondary);\">dropdowns, sheets<\u002Fspan><\u002Fdiv>\n              <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 0; border-bottom: 1px solid var(--border-subtle); align-items: center;\"><code style=\"font-family:'Geist Mono',monospace; font-size: 12px;\">slow<\u002Fcode><span style=\"font-family:'Geist Mono',monospace; font-size: 12px; color: var(--text-muted);\">320ms<\u002Fspan><span style=\"font-size: 12px; color: var(--text-secondary);\">drawer, modal entry<\u002Fspan><\u002Fdiv>\n              <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 0; align-items: center;\"><code style=\"font-family:'Geist Mono',monospace; font-size: 12px;\">slower<\u002Fcode><span style=\"font-family:'Geist Mono',monospace; font-size: 12px; color: var(--text-muted);\">480ms<\u002Fspan><span style=\"font-size: 12px; color: var(--text-secondary);\">onboarding, hero reveal<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; overflow: hidden;\">\n            <div style=\"padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;\">Easings<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding: 8px 20px;\">\n              <div style=\"padding: 12px 0; border-bottom: 1px solid var(--border-subtle);\"><div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;\"><code style=\"font-family:'Geist Mono',monospace; font-size: 12px;\">ease-standard<\u002Fcode><span style=\"font-family:'Geist Mono',monospace; font-size: 11px; color: var(--text-muted);\">cubic-bezier(.2, 0, 0, 1)<\u002Fspan><\u002Fdiv><div style=\"font-size: 12px; color: var(--text-secondary);\">Padrão para qualquer transição<\u002Fdiv><\u002Fdiv>\n              <div style=\"padding: 12px 0; border-bottom: 1px solid var(--border-subtle);\"><div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;\"><code style=\"font-family:'Geist Mono',monospace; font-size: 12px;\">ease-out<\u002Fcode><span style=\"font-family:'Geist Mono',monospace; font-size: 11px; color: var(--text-muted);\">cubic-bezier(0, 0, .2, 1)<\u002Fspan><\u002Fdiv><div style=\"font-size: 12px; color: var(--text-secondary);\">Entradas (modal, toast, sheet)<\u002Fdiv><\u002Fdiv>\n              <div style=\"padding: 12px 0; border-bottom: 1px solid var(--border-subtle);\"><div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;\"><code style=\"font-family:'Geist Mono',monospace; font-size: 12px;\">ease-in<\u002Fcode><span style=\"font-family:'Geist Mono',monospace; font-size: 11px; color: var(--text-muted);\">cubic-bezier(.4, 0, 1, 1)<\u002Fspan><\u002Fdiv><div style=\"font-size: 12px; color: var(--text-secondary);\">Saídas, dismiss<\u002Fdiv><\u002Fdiv>\n              <div style=\"padding: 12px 0;\"><div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;\"><code style=\"font-family:'Geist Mono',monospace; font-size: 12px;\">ease-spring<\u002Fcode><span style=\"font-family:'Geist Mono',monospace; font-size: 11px; color: var(--text-muted);\">cubic-bezier(.5, 1.4, .5, 1)<\u002Fspan><\u002Fdiv><div style=\"font-size: 12px; color: var(--text-secondary);\">Confirmações, sucesso (uso parcimonioso)<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 24px;\">\n          <h3 style=\"font-size: 14px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 0 0 12px; font-weight: 500;\">Regras<\u002Fh3>\n          <ul style=\"margin: 0; padding-left: 18px; color: var(--text-secondary); font-size: 14px; line-height: 1.7;\">\n            <li>Use <code style=\"font-family:'Geist Mono',monospace;\">transform<\u002Fcode> e <code style=\"font-family:'Geist Mono',monospace;\">opacity<\u002Fcode>; evite animar layout (width, height, top, left).<\u002Fli>\n            <li>Nunca anime mais que 2 propriedades simultaneamente em um único elemento.<\u002Fli>\n            <li>Hover/focus em &lt;160ms. Entradas de overlay 200–320ms. Loops contínuos só em loaders.<\u002Fli>\n            <li>Em <code style=\"font-family:'Geist Mono',monospace;\">prefers-reduced-motion: reduce<\u002Fcode>, mantenha o efeito mas reduza para 0.001s.<\u002Fli>\n            <li>Página deve sempre carregar abaixo de 200ms TTI percebido — esqueletos &gt; spinners para listas.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      {{!-- ========== ICONOGRAPHY ========== --}}\n      <section id=\"icons\" style=\"margin-bottom: 96px;\">\n        <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px;\">\n          <h2 style=\"font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin: 0;\">Iconography<\u002Fh2>\n          <span style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;\">§08 / Foundations<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size: 15px; color: var(--text-secondary); margin: 0 0 32px; max-width: 70ch;\">Biblioteca recomendada: <strong style=\"color: var(--text-primary);\">Lucide Icons<\u002Fstrong>. Stroke 2px, cantos arredondados, viewBox 24×24. Alternativa para densidade extra: <strong style=\"color: var(--text-primary);\">Phosphor Regular<\u002Fstrong>. Nunca misture famílias na mesma tela.<\u002Fp>\n\n        <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;\">\n          <div style=\"padding: 20px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px; text-align: center;\">\n            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin: 0 auto; display: block; color: var(--text-primary);\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 12px;\">12px · inline em badges<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 20px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px; text-align: center;\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin: 0 auto; display: block; color: var(--text-primary);\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 12px;\">16px · botões padrão<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 20px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px; text-align: center;\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin klch(0.205 0.007 255);\n  --surface:        oklch(0.235 0.008 255);\n  --surface-hover:  oklch(0.305 0.010 255);\n\n  /* Text */\n  --text-primary:   oklch(0.965 0.003 255);\n  --text-secondary: oklch(0.78  0.006 255);\n  --text-muted:     oklch(0.59  0.008 255);\n\n  /* Brand */\n  --primary:        oklch(0.66 0.16 250);\n  --primary-hover:  oklch(0.71 0.16 250);\n  --primary-soft:   oklch(0.30 0.09 250);\n\n  /* Feedback */\n  --success:        oklch(0.72 0.15 150);\n  --warning:        oklch(0.80 0.14 80);\n  --danger:         oklch(0.66 0.19 25);\n\n  /* Type */\n  --font-sans:      \"Geist\", system-ui, sans-serif;\n  --font-mono:      \"Geist Mono\", monospace;\n\n  /* Radius */\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n\n  /* Motion */\n  --ease-standard: cubic-bezier(.2, 0, 0, 1);\n  --duration-fast: 160ms;\n  --duration-base: 220ms;\n}\n\n[data-theme=\"light\"] {\n  --bg-base:      oklch(0.985 0.003 255);\n  --text-primary: oklch(0.205 0.012 255);\n  /* ... */\n}<\u002Fpre>\n          <\u002Fdiv>\n\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden;\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface-2); border-bottom: 1px solid var(--border-subtle);\">\n              <span style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;\">tailwind.config.ts<\u002Fspan>\n              <span style=\"font-size: 11px; color: var(--text-muted);\">Tailwind theme extension<\u002Fspan>\n            <\u002Fdiv>\n<pre style=\"margin: 0; padding: 18px; font-family: 'Geist Mono', monospace; font-size: 12px; line-height: 1.6; color: var(--text-secondary); overflow-x: auto;\">import type { Config } from \"tailwindcss\";\n\nexport default {\n  theme: {\n    extend: {\n      colors: {\n        bg: {\n          base:     \"var(--bg-base)\",\n          elevated: \"var(--bg-elevated)\",\n        },\n        surface: {\n          DEFAULT: \"var(--surface)\",\n          hover:   \"var(--surface-hover)\",\n        },\n        text: {\n          primary:   \"var(--text-primary)\",\n          secondary: \"var(--text-secondary)\",\n          muted:     \"var(--text-muted)\",\n        },\n        primary: {\n          DEFAULT: \"var(--primary)\",\n          hover:   \"var(--primary-hover)\",\n          soft:    \"var(--primary-soft)\",\n        },\n        success: \"var(--success)\",\n        warning: \"var(--warning)\",\n        danger:  \"var(--danger)\",\n      },\n      fontFamily: {\n        sans: [\"var(--font-sans)\"],\n        mono: [\"var(--font-mono)\"],\n      },\n      borderRadius: {\n        sm: \"var(--radius-sm)\",\n        md: \"var(--radius-md)\",\n        lg: \"var(--radius-lg)\",\n        xl: \"var(--radius-xl)\",\n      },\n      transitionTimingFunction: {\n        standard: \"var(--ease-standard)\",\n      },\n    },\n  },\n} satisfies Config;<\u002Fpre>\n          <\u002Fdiv>\n\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden; grid-column: span 2;\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface-2); border-bottom: 1px solid var(--border-subtle);\">\n              <span style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;\">tokens.json<\u002Fspan>\n              <span style=\"font-size: 11px; color: var(--text-muted);\">Design Tokens Community Group format · source of truth<\u002Fspan>\n            <\u002Fdiv>\n<pre style=\"margin: 0; padding: 18px; font-family: 'Geist Mono', monospace; font-size: 12px; line-height: 1.6; color: var(--text-secondary); overflow-x: auto;\">{\n  \" px;\">\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"2\" style=\"flex-shrink: 0; margin-top: 1px;\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font-size: 13px; line-height: 1.6;\"><strong style=\"color: var(--text-primary);\">Resumo de 30 segundos.<\u002Fstrong> Coletamos apenas o necessário para autenticar você, faturar corretamente e melhorar nossos produtos. Não vendemos seus dados. Você pode baixar, corrigir ou excluir tudo a qualquer momento na área <a href=\"#\" style=\"color: var(--primary);\">Meus dados<\u002Fa>.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <h2 style=\"font-size: 22px; font-weight: 600; letter-spacing: -0.015em; margin: 32px 0 12px;\">1. Quem somos<\u002Fh2>\n            <p style=\"font-size: 15px; line-height: 1.65; color: var(--text-secondary); margin: 0 0 8px;\">Acme Tecnologia Ltda., CNPJ 00.000.000/0001-00, sediada em São Paulo/SP.<\u002Fp>\n            <ul style=\"margin: 0 0 16px; padding-left: 18px; font-size: 14px; line-height: 1.7; color: var(--text-secondary);\"><li><strong style=\"color: var(--text-primary);\">Encarregado (DPO):<\u002Fstrong> Tatiana Lima — <a href=\"#\" style=\"color: var(--primary);\">dpo@acme.com<\u002Fa><\u002Fli><li><strong style=\"color: var(--text-primary);\">Canal exclusivo de direitos do titular:<\u002Fstrong> <a href=\"#\" style=\"color: var(--primary);\">acme.com/meus-dados<\u002Fa><\u002Fli><\u002Ful>\n\n            <h2 style=\"font-size: 22px; font-weight: 600; letter-spacing: -0.015em; margin: 32px 0 12px;\">2. Dados que coletamos<\u002Fh2>\n            <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 10px; overflow: hidden; margin-bottom: 16px;\">\n              <div style=\"display: grid; grid-template-columns: 1fr 1.5fr 1fr; padding: 10px 16px; backgrou ); border-radius: 999px; flex-shrink: 0; margin-top: 2px;\"><span style=\"position: absolute; top: 1px; left: 1px; width: 14px; height: 14px; background: var(--text-muted); border-radius: 999px;\"><\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding: 14px 24px; background: var(--surface); border-top: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 8px;\">\n                <button style=\"height: 38px; background: var(--primary); color: var(--primary-fg); border: none; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer;\">Salvar minhas preferências<\u002Fbutton>\n                <div style=\"display: flex; gap: 6px;\">\n                  <button style=\"flex: 1; height: 32px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-default); border-radius: 7px; font-family: inherit; font-size: 12px; cursor: pointer;\">Rejeitar opcionais<\u002Fbutton>\n                  <button style=\"flex: 1; height: 32px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-default); border-radius: 7px; font-family: inherit; font-size: 12px; cursor: pointer;\">Aceitar todos<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display: flex; justify-content: center; gap: 14px; margin-top: 4px;\"><a href=\"#\" style=\"font-size: 11px; color: var(--text-muted); text-decoration: none;\">Política de Cookies<\u002Fa><a href=\"#\" style=\"font-size: 11px; color: var(--text-muted); text-decoration: none;\">Privacidade<\u002Fa><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"position: absolute; bottom: 8px; left: 12px; font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; z-index: 1;\">Cookies preferences<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        {{!-- Cookie banner --}}\n        <div style=\"margin-top: 16px; background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 32px; position: relative; overflow: hidden;\">\n          <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px;\">Cookie banner · primeiro acesso · canto inferior<\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--bg-elevated); border: 1px solid var(--border-default); border-radius: 14px; box-shadow: var(--shadow-xl); max-width: 720px;\">\n            <div style=\"width: 36px; height: 36px; border-radius: 10px; background: var(--primary-soft); display: grid; place-items: center; flex-shrink: 0;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"2\"><path d=\"M21.5 12.5a9.5 9.5 0 1 1-9-9.5\"><\u002Fpath><path d=\"M22 4l-9 9-3-3\"><\u002Fpath><circle cx=\"8\" cy=\"14\" r=\"1\"><\u002Fcircle><circle cx=\"15\" cy=\"9\" r=\"1\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex: 1; font-size: 13px; color: var(--text-secondary); line-height: 1.55;\">Usamos cookies para o site funcionar, entender uso e melhorar a experiência. Você pode aceitar todos, rejeitar opcionais ou ajustar individualmente. <a href=\"#\" style=\"color: var(--primary);\">Saiba mais<\u002Fa>.<\u002Fdiv>\n            <div style=\"display: flex; gap: 6px; flex-shrink: 0;\">\n              <button style=\"padding: 0 12px; height: 34px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-default); border-radius: 7px; font-family: inherit; font-size: 12px; cursor: pointer;\">Personalizar<\u002Fbutton>\n              <button style=\"padding: 0 12px; height: 34px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-default); border-radius: 7px; font-family: inherit; font-size: 12px; cursor: pointer;\">Só essenciais<\u002Fbutton>\n              <button style=\"padding: 0 14px; height: 34px; background: var(--primary); color: var(--primary-fg); border: none; border-radius: 7px; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer;\">Aceitar todos<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      {{!-- ============================================ GUIDELINES DIVIDER ============================================ --}}\n      <section style=\"margin-bottom: 32px;\">\n        <div style=\"display: flex; align-items: center; gap: 16px; padding: 32px 0; border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle);\">\n          <span style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;\">Part IV<\u002Fspan>\n          <div style=\"flex: 1; height: 1px; background: var(--border-subtle);\"><\u002Fdiv>\n          <span style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;\">Guidelines<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      {{!-- LGPD --}}\n      <section id=\"lgpd\" style=\"margin-bottom: 96px;\">\n        <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px;\">\n          <h2 style=\"font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin: 0;\">LGPD &amp; privacidade<\u002Fh2>\n          <span style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;\">§17 / Guidelines<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size: 15px; color: var(--text-secondary); margin: 0 0 32px; max-width: 70ch;\">Padrões visuais e de UX para conformidade. Não substitui consultoria jurídica — o conteúdo final é validado pelo seu DPO/jurídico.<\u002Fp>\n\n        <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 28px; margin-bottom: 16px;\">\n          <h3 style=\"font-size: 16px; font-weight: 600; margin: 0 0 16px;\">Princípios operacionais<\u002Fh3>\n          <ul style=\"margin: 0; padding-left: 18px; color: var(--text-secondary); font-size: 14px; line-height: 1.75;\">\n            <li><strong style=\"color: var(--text-primary);\">Consentimento ≠ aceite forçado.<\u002Fstrong> \"Rejeitar opcionais\" deve ter o mesmo peso visual de \"Aceitar todos\". Nenhum botão \"Aceitar\" pré-selecionado quando o consentimento é a base legal.<\u002Fli>\n            <li><strong style=\"color: var(--text-primary);\">Granularidade real.<\u002Fstrong> Categorias de cookies devem ser toggleáveis individualmente. Toggles desabilitados só para \"Essenciais\", com tooltip explicando por quê.<\u002Fli>\n            <li><strong style=\"color: var(--text-primary);\">Microcopy honesta.<\u002Fstrong> Cada campo que coleta dado pessoal mostra para quê serve e qual a base legal (execução de contrato, obrigação legal, consentimento, legítimo interesse).<\u002Fli>\n            <li><strong style=\"color: var(--text-primary);\">Direitos visíveis.<\u002Fstrong> \"Meus dados\" deve estar no menu de conta com no máximo 1 nível de profundidade — nunca escondido em FAQ.<\u002Fli>\n            <li><strong style=\"color: var(--text-primary);\">Registro de consentimento.<\u002Fstrong> Toda alteração de preferência gera um log com data, IP e versão da política. Disponível ao usuário em \"Meus dados\".<\u002Fli>\n            <li><strong style=\"color: var(--text-primary);\">Identificação visível.<\u002Fstrong> Controlador, operadores, DPO e canal de contato têm página própria, linkada do footer e da Política de Privacidade.<\u002Fli>\n            <li><strong style=\"color: var(--text-primary);\">Páginas legais legíveis.<\u002Fstrong> Largura máxima 70ch, body ≥15px, índice no topo para documentos longos, sumário de 30s logo após o título.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 24px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;\">Microcopy de campo<\u002Fdiv>\n            <div style=\"padding: 14px; background: var(--surface-2); border: 1px solid var(--border-subtle); border-radius: 10px; margin-bottom: 12px;\">\n              <label style=\"display: block; font-size: 12px; font-weight: 500; margin-bottom: 5px;\">CPF <span style=\"color: var(--danger);\">*<\u002Fspan><\u002Flabel>\n              <input value=\"123.456.789-00\" style=\"width: 100%; height: 32px; padding: 0 10px; background: var(--surface); border: 1px solid var(--border-default); border-radius: 6px; color: var(--text-primary); font-family: 'Geist Mono', monospace; font-size: 12px;\">\n              <div style=\"margin-top: 6px; font-size: 11px; color: var(--text-muted); display: flex; align-items: flex-start; gap: 6px;\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"flex-shrink: 0; margin-top: 1px;\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>Usado apenas para emissão de NF. Não é compartilhado. Base legal: obrigação legal (art. 7º, II LGPD).<\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-size: 12px; color: var(--text-muted); line-height: 1.55;\">Toda finalidade declarada no campo evita perguntas depois e cria registro de transparência.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 24px;\">\n            <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;\">Footer · links obrigatórios<\u002Fdiv>\n            <div style=\"padding: 16px; background: var(--surface-2); border: 1px solid var(--border-subtle); border-radius: 10px;\">\n              <div style=\"display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12px;\">\n                <a href=\"#\" style=\"color: var(--text-secondary); text-decoration: none;\">Política de Privacidade<\u002Fa>\n                <a href=\"#\" style=\"color: var(--text-secondary); text-decoration: none;\">Termos de Uso<\u002Fa>\n                <a href=\"#\" style=\"color: var(--text-secondary); text-decoration: none;\">Política de Cookies<\u002Fa>\n                <a href=\"#\" style=\"color: var(--text-secondary); text-decoration: none;\">Preferências de cookies<\u002Fa>\n                <a href=\"#\" style=\"color: var(--text-secondary); text-decoration: none;\">Direitos do titular<\u002Fa>\n                <a href=\"#\" style=\"color: var(--text-secondary); text-decoration: none;\">DPO / Encarregado<\u002Fa>\n                <a href=\"#\" style=\"color: var(--text-secondary); text-decoration: none;\">Subprocessadores<\u002Fa>\n                <a href=\"#\" style=\"color: var(--text-secondary); text-decoration: none;\">Segurança<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-size: 12px; color: var(--text-muted); line-height: 1.55; margin-top: 12px;\">Estes links devem aparecer em <strong style=\"color: var(--text-primary);\">todas<\u002Fstrong> as páginas, inclusive áreas logadas.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      {{!-- ACCESSIBILITY --}}\n      <section id=\"a11y\" style=\"margin-bottom: 96px;\">\n        <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px;\">\n          <h2 style=\"font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin: 0;\">Acessibilidade<\u002Fh2>\n          <span style=\"font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;\">§18 / Guidelines<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size: 15px; color: var(--text-secondary); margin: 0 0 32px; max-width: 70ch;\">WCAG 2.2 nível AA é o piso, não o teto. A11y faz parte do \"definition of done\" — nenhuma feature entra sem checar contraste, foco e teclado.<\u002Fp>\n\n        <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;\">\n          <div style=\"padding: 22px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\"><div style=\"display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; background: var(--primary-soft); color: var(--primary); margin-bottom: 14px;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4l3 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-size: 15px; font-weight: 600; margin: 0 0 6px;\">Contraste<\u002Fh3><p style=\"font-size: 13px; color: var(--text-secondary); margin: 0; line-height: 1.55;\">≥ 4.5:1 para texto normal, ≥ 3:1 para texto grande e UI. Estados ativos verificados em ambos os temas.<\u002Fp><\u002Fdiv>\n          <div style=\"padding: 22px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\"><div style=\"display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; background: var(--primary-soft); color: var(--primary); margin-bottom: 14px;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"6\" width=\"20\" height=\"12\" rx=\"2\"><\u002Frect><path d=\"M6 12h4M14 12h4\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-size: 15px; font-weight: 600; margin: 0 0 6px;\">Teclado<\u002Fh3><p style=\"font-size: 13px; color: var(--text-secondary); margin: 0; line-height: 1.55;\">Toda ação acessível por Tab. Modais retêm foco; <kbd style=\"font-family:'Geist Mono',monospace; padding: 1px 4px; background: var(--surface-2); border: 1px solid var(--border-subtle); border-radius: 3px; font-size: 11px;\">Esc<\u002Fkbd> sempre fecha. Skip link no topo.<\u002Fp><\u002Fdiv>\n          <div style=\"padding: 22px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\"><div style=\"display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; background: var(--primary-soft); color: var(--primary); margin-bottom: 14px;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><h3 style=\"font-size: 15px; font-weight: 600; margin: 0 0 6px;\">Foco visível<\u002Fh3><p style=\"font-size: 13px; color: var(--text-secondary); margin: 0; line-height: 1.55;\">Ring de 2px em <code style=\"font-family:'Geist Mono',monospace;\">--primary<\u002Fcode> + offset 2px. <strong style=\"color: var(--text-primary);\">Nunca<\u002Fstrong> remova outline sem substituto.<\u002Fp><\u002Fdiv>\n          <div style=\"padding: 22px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\"><div style=\"display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; background: var(--primary-soft); color: var(--primary); margin-bottom: 14px;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 18v-6a9 9 0 0 1 18 0v6\"><\u002Fpath><path d=\"M21 19a2 2 0 0 1-2 2h-1v-6h3z\"><\u002Fpath><path d=\"M3 19a2 2 0 0 0 2 2h1v-6H3z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-size: 15px; font-weight: 600; margin: 0 0 6px;\">Screen readers<\u002Fh3><p style=\"font-size: 13px; color: var(--text-secondary); margin: 0; line-height: 1.55;\">Semântica nativa primeiro, ARIA depois. <code style=\"font-family:'Geist Mono',monospace;\">aria-label<\u002Fcode> em ícones-só. Live regions para toasts.<\u002Fp><\u002Fdiv>\n          <div style=\"padding: 22px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\"><div style=\"display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; background: var(--primary-soft); color: var(--primary); margin-bottom: 14px;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-size: 15px; font-weight: 600; margin: 0 0 6px;\">Cor não é único canal<\u002Fh3><p style=\"font-size: 13px; color: var(--text-secondary); margin: 0; line-height: 1.55;\">Erros têm ícone + texto. Status usa cor + label. Daltonismo testado em todos os charts.<\u002Fp><\u002Fdiv>\n          <div style=\"padding: 22px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;\"><div style=\"display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; background: var(--primary-soft); color: var(--primary); margin-bottom: 14px;\"><svg width=\"18 nsform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>Não<\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 12px; font-size: 13px; color: var(--text-secondary);\">\n              <div style=\"padding: 10px 14px; background: var(--bg-base); border-left: 2px solid var(--danger); border-radius: 4px; text-decoration: line-through; text-decoration-color: var(--text-muted);\">\"Ops! Não encontramos nada 😢\"<\u002Fdiv>\n              <div style=\"padding: 10px 14px; background: var(--bg-base); border-left: 2px solid var(--danger); border-radius: 4px; text-decoration: line-through; text-decoration-color: var(--text-muted);\">\"Submeter formulário\"<\u002Fdiv>\n              <div style=\"padding: 10px 14px; background: var(--bg-base); border-left: 2px solid var(--danger); border-radius: 4px; text-decoration: line-through; text-decoration-color: var(--text-muted);\">\"Tem certeza que deseja realmente excluir?\"<\u002Fdiv>\n              <div style=\"padding: 10px 14px; background: var(--bg-base); border-left: 2px solid var(--danger); border-radius: 4px; text-decoration: line-through; text-decoration-color: var(--text-muted);\">\"Erro 422: Unprocessable entity\"<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px; overflow: hidden;\">\n          <div style=\"display: grid; grid-template-columns: 180px 1fr 1fr; padding: 12px 20px; background: var(--surface-2); font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;\"><div>Contexto<\u002Fdiv><div>Princípio<\u002Fdiv><div>Exemplo<\u002Fdiv><\u002Fdiv>\n          <div style=\"display: grid; grid-template-column
